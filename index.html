<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sketchbook</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500&family=Newsreader:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root{--paper:#fdfcfa;--line:#e8e4de;--ink:#2c2a26;--ink-l:#6b675e;--ink-ll:#a09b90;--ink-f:#d4d0c8;--accent:#c45a3c;--accent-l:rgba(196,90,60,0.06);--sh-s:0 1px 3px rgba(0,0,0,0.06);--sh-m:0 4px 12px rgba(0,0,0,0.08),0 2px 4px rgba(0,0,0,0.04);--sh-l:0 12px 40px rgba(0,0,0,0.1),0 4px 12px rgba(0,0,0,0.05);--sh-xl:0 20px 60px rgba(0,0,0,0.14),0 8px 20px rgba(0,0,0,0.07);--r:3px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--paper);color:var(--ink);font-family:'Newsreader',Georgia,serif;overflow-x:hidden;min-height:100vh;-webkit-tap-highlight-color:transparent}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg width='100' height='100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23n)' opacity='0.018'/%3E%3C/svg%3E");pointer-events:none;z-index:0}

.tb{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(253,252,250,0.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--line);padding:0 24px;height:54px;display:flex;align-items:center;justify-content:space-between;transition:box-shadow .3s}
.tb.scrolled{box-shadow:0 1px 8px rgba(0,0,0,0.06)}
.tb-l{display:flex;align-items:center;gap:16px}
.brand{font-family:'Caveat',cursive;font-size:24px;font-weight:600;user-select:none;flex-shrink:0}
.brand span{color:var(--accent)}
.sep{width:1px;height:20px;background:var(--ink-f)}
.cnt{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-ll);letter-spacing:.5px;white-space:nowrap}
.tb-r{display:flex;align-items:center;gap:6px}

.btn{padding:7px 14px;border:1px solid var(--line);border-radius:var(--r);background:transparent;color:var(--ink-l);font-family:'IBM Plex Mono',monospace;font-size:11px;cursor:pointer;transition:.2s;display:inline-flex;align-items:center;gap:5px;letter-spacing:.3px;white-space:nowrap;-webkit-user-select:none;user-select:none}
.btn:hover{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.btn:active{transform:scale(0.97)}
.btn.pr{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.btn.pr:hover{background:var(--accent);border-color:var(--accent)}
.btn svg{width:14px;height:14px;flex-shrink:0}
.btn .lbl{display:inline}

.canvas{padding:72px 20px 300px;min-height:100vh;position:relative}

.dz{position:fixed;inset:0;z-index:999;background:rgba(253,252,250,0.95);display:none;place-items:center;pointer-events:none}
.dz.on{display:grid}
.dz-in{text-align:center;animation:dzIn .3s ease}
.dz-in svg{width:56px;height:56px;color:var(--accent);margin-bottom:12px}
.dz-in p{font-family:'Caveat',cursive;font-size:26px;color:var(--ink-l)}
@keyframes dzIn{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}

.sk{position:absolute;background:#fff;border-radius:var(--r);box-shadow:var(--sh-m);user-select:none;z-index:1;touch-action:none}
.sk:hover{box-shadow:var(--sh-l);z-index:5}
.sk.dragging{box-shadow:var(--sh-xl);z-index:50;transform:rotate(-0.8deg) scale(1.015);transition:box-shadow .15s,transform .15s}
.sk.locked{cursor:default}.sk.locked:hover{box-shadow:var(--sh-m)}
.sk:not(.locked){cursor:grab}.sk.dragging:not(.locked){cursor:grabbing}

.drag-handle{display:flex;align-items:center;justify-content:center;padding:6px 0;cursor:grab;touch-action:none;border-bottom:1px solid rgba(0,0,0,0.04);transition:background .15s;gap:2px}
.drag-handle:hover{background:rgba(0,0,0,0.02)}
.drag-handle:active{cursor:grabbing;background:rgba(0,0,0,0.03)}
.drag-handle .grip{display:flex;flex-direction:column;gap:3px;align-items:center;opacity:0.25;transition:opacity .2s}
.drag-handle:hover .grip{opacity:0.5}
.drag-handle .grip span{display:block;width:20px;height:2px;background:var(--ink-ll);border-radius:1px}
.sk.locked .drag-handle{cursor:default;pointer-events:none}
.sk.locked .drag-handle .grip{opacity:0.1}

.nt-handle{display:flex;align-items:center;justify-content:center;padding:4px 0;cursor:grab;touch-action:none;margin-bottom:4px;opacity:0.2;transition:opacity .2s}
.nt-handle:hover{opacity:0.5}
.nt-handle:active{cursor:grabbing}
.nt-handle .grip{display:flex;gap:3px;align-items:center}
.nt-handle .grip span{display:block;width:2px;height:2px;background:var(--ink-ll);border-radius:50%}
.nt.locked .nt-handle{cursor:default;pointer-events:none;opacity:0.08}

body.move-mode .sk:not(.locked),body.move-mode .nt:not(.locked){outline:1px dashed var(--ink-f);outline-offset:2px}
body.move-mode .drag-handle{background:rgba(196,90,60,0.04)}
body.move-mode .drag-handle .grip{opacity:0.5}
.mv-indicator{position:fixed;top:58px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;font-family:'IBM Plex Mono',monospace;font-size:11px;padding:6px 16px;border-radius:0 0 6px 6px;z-index:101;display:none;letter-spacing:.3px}
body.move-mode .mv-indicator{display:block}
.sk-img{position:relative;overflow:hidden;line-height:0}
.sk-img img{width:100%;height:auto;display:block;pointer-events:none;-webkit-user-drag:none}
.sk-ctrl{position:absolute;top:6px;right:6px;display:flex;gap:3px;opacity:0;transition:opacity .2s}
.sk:hover .sk-ctrl,.sk.ta .sk-ctrl{opacity:1}

.sb{width:28px;height:28px;border-radius:50%;border:none;background:rgba(255,255,255,0.9);backdrop-filter:blur(6px);color:var(--ink-l);cursor:pointer;display:grid;place-items:center;font-size:13px;transition:.15s;box-shadow:0 1px 4px rgba(0,0,0,0.1)}
.sb:hover{background:#fff;color:var(--ink);transform:scale(1.1)}
.sb.on{background:var(--accent);color:#fff}
.sb.del:hover{background:var(--accent);color:#fff}

.sk-cap{padding:8px 12px;min-height:32px}
.cap-in{width:100%;border:none;outline:none;background:transparent;font-family:'Caveat',cursive;font-size:16px;color:var(--ink);resize:none;line-height:1.4;overflow:hidden}
.cap-in::placeholder{color:var(--ink-f);font-style:italic}
.sk-date{padding:0 12px 8px;font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--ink-ll);letter-spacing:.5px}
.rh{position:absolute;bottom:0;right:0;width:18px;height:18px;cursor:nwse-resize;opacity:0;transition:opacity .2s;z-index:2}
.sk:hover .rh,.sk.ta .rh{opacity:1}
.sk.locked .rh{display:none}
.rh::after{content:'';position:absolute;bottom:3px;right:3px;width:7px;height:7px;border-right:1.5px solid var(--ink-f);border-bottom:1.5px solid var(--ink-f)}

.nt{position:absolute;background:transparent;user-select:none;z-index:1;touch-action:none;min-width:100px}
.nt:not(.locked){cursor:grab}.nt.dragging{z-index:50;cursor:grabbing}.nt.locked{cursor:default}
.nt-ctrl{position:absolute;top:0;right:0;display:flex;gap:3px;opacity:0;transition:opacity .2s}
.nt:hover .nt-ctrl,.nt.ta .nt-ctrl{opacity:1}
.nt-text{border:none;outline:none;background:transparent;font-family:'Caveat',cursive;font-size:22px;color:var(--ink);resize:none;line-height:1.5;width:100%;min-height:30px;overflow:hidden}
.nt-text::placeholder{color:var(--ink-f)}
.nt-text:focus{border-bottom:1px dashed var(--ink-f)}
.nt-text.sm{font-size:16px}.nt-text.lg{font-size:32px}.nt-text.xl{font-size:48px;font-weight:600}

.empty{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;z-index:0;padding:20px}
.empty svg{width:64px;height:64px;color:var(--ink-f);margin-bottom:16px;opacity:.5}
.empty h2{font-family:'Caveat',cursive;font-size:28px;font-weight:500;color:var(--ink-ll);margin-bottom:6px}
.empty p{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ink-f);line-height:1.8}

.menu{position:fixed;top:54px;right:0;width:260px;background:rgba(253,252,250,0.97);backdrop-filter:blur(16px);border-left:1px solid var(--line);border-bottom:1px solid var(--line);border-radius:0 0 0 8px;z-index:99;padding:16px;transform:translateX(100%);transition:transform .3s cubic-bezier(.16,1,.3,1);box-shadow:var(--sh-l)}
.menu.open{transform:translateX(0)}
.menu-t{font-family:'IBM Plex Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--ink-ll);margin-bottom:12px}
.mi{display:flex;align-items:center;gap:10px;padding:10px;border-radius:var(--r);cursor:pointer;transition:.15s;font-size:13px;color:var(--ink-l);border:none;background:none;width:100%;text-align:left;font-family:'Newsreader',serif}
.mi:hover{background:var(--accent-l);color:var(--ink)}
.mi svg{width:18px;height:18px;flex-shrink:0;opacity:.6}
.msep{height:1px;background:var(--line);margin:8px 0}

.cf-ov{position:fixed;inset:0;background:rgba(253,252,250,0.85);backdrop-filter:blur(8px);z-index:500;display:none;place-items:center}
.cf-ov.on{display:grid}
.cf-box{background:#fff;border:1px solid var(--line);border-radius:6px;padding:24px 28px;box-shadow:var(--sh-l);text-align:center;max-width:320px;margin:20px}
.cf-box p{font-size:14px;margin-bottom:18px;color:var(--ink-l);line-height:1.6}
.cf-acts{display:flex;gap:8px;justify-content:center}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--ink);color:var(--paper);padding:9px 18px;border-radius:100px;font-family:'IBM Plex Mono',monospace;font-size:11px;z-index:200;opacity:0;transition:.4s cubic-bezier(.16,1,.3,1);white-space:nowrap;box-shadow:var(--sh-l)}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.scroll-top{position:fixed;bottom:20px;right:20px;width:36px;height:36px;border-radius:50%;border:1px solid var(--line);background:rgba(253,252,250,0.9);backdrop-filter:blur(8px);color:var(--ink-l);cursor:pointer;display:grid;place-items:center;font-size:16px;z-index:100;opacity:0;transition:.3s;box-shadow:var(--sh-s)}
.scroll-top.vis{opacity:1}
.scroll-top:hover{background:var(--ink);color:var(--paper);border-color:var(--ink)}

.fab-wrap{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:100;display:none;gap:8px;align-items:center}
.fab{width:50px;height:50px;border-radius:50%;background:var(--ink);color:var(--paper);border:none;font-size:22px;cursor:pointer;box-shadow:var(--sh-l);display:grid;place-items:center;transition:.2s}
.fab:active{transform:scale(.92)}
.fab-s{width:40px;height:40px;border-radius:50%;background:var(--paper);color:var(--ink-l);border:1px solid var(--line);font-size:15px;cursor:pointer;box-shadow:var(--sh-m);display:grid;place-items:center;transition:.2s}
.fab-s:active{transform:scale(.92)}

#fileIn,#cameraIn,#importIn{display:none}
@media(max-width:640px){
  .tb{padding:0 12px;height:50px}
  .brand{font-size:20px}
  .sep,.cnt{display:none}
  .btn .lbl{display:none}
  .btn{padding:7px 10px}
  .canvas{padding:62px 10px 300px}
  .menu{width:220px}
  .fab-wrap{display:flex}
  .drag-handle{padding:10px 0}
  .drag-handle .grip span{width:28px;height:2.5px}
  .nt-handle{padding:8px 0}
  body.move-mode .fab-wrap .fab-s:first-child{background:var(--accent);color:#fff;border-color:var(--accent)}
}
</style>
</head>
<body>

<div class="tb" id="toolbar">
  <div class="tb-l">
    <div class="brand">sketch<span>book</span></div>
    <div class="sep"></div>
    <div class="cnt" id="cnt">0 elementów</div>
  </div>
  <div class="tb-r">
    <button class="btn" onclick="toggleMove()" id="moveBtn" title="Tryb przesuwania">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="5 9 2 12 5 15"/><polyline points="9 5 12 2 15 5"/><polyline points="15 19 12 22 9 19"/><polyline points="19 9 22 12 19 15"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="12" y1="2" x2="12" y2="22"/></svg>
      <span class="lbl">Przesuń</span>
    </button>
    <button class="btn" onclick="addTextNote()" title="Tekst">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 7V4h16v3"/><line x1="12" y1="4" x2="12" y2="20"/><line x1="8" y1="20" x2="16" y2="20"/></svg>
      <span class="lbl">Tekst</span>
    </button>
    <button class="btn" onclick="toggleGrid()" id="gridBtn" title="Siatka">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      <span class="lbl">Siatka</span>
    </button>
    <button class="btn" onclick="toggleMenu()" id="menuBtn" title="Menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>
    </button>
    <button class="btn pr" onclick="triggerUpload()" title="Dodaj">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      <span class="lbl">Dodaj</span>
    </button>
  </div>
</div>

<div class="menu" id="menu">
  <div class="menu-t">Backup</div>
  <button class="mi" onclick="exportBackup()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Eksportuj backup
  </button>
  <button class="mi" onclick="document.getElementById('importIn').click()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    Importuj backup
  </button>
  <div class="msep"></div>
  <div class="menu-t">Dodaj</div>
  <button class="mi" onclick="triggerUpload()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
    Zdjęcie z galerii
  </button>
  <button class="mi" onclick="triggerCamera()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
    Zrób zdjęcie aparatem
  </button>
  <button class="mi" onclick="addTextNote();toggleMenu(false)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M4 7V4h16v3"/><line x1="12" y1="4" x2="12" y2="20"/><line x1="8" y1="20" x2="16" y2="20"/></svg>
    Notatka tekstowa
  </button>
  <div class="msep"></div>
  <div class="menu-t">Narzędzia</div>
  <button class="mi" onclick="toggleMove();toggleMenu(false)">↕ Tryb przesuwania</button>
  <button class="mi" onclick="lockAll()">🔒 Zablokuj wszystko</button>
  <button class="mi" onclick="unlockAll()">🔓 Odblokuj wszystko</button>
</div>

<input type="file" id="fileIn" accept="image/*" multiple onchange="handleFiles(this.files)">
<input type="file" id="cameraIn" accept="image/*" capture="environment" onchange="handleFiles(this.files)">
<input type="file" id="importIn" accept=".json" onchange="importBackup(this.files[0])">

<div class="canvas" id="canvas">
  <div class="empty" id="emptyEl">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/><circle cx="11" cy="11" r="2"/></svg>
    <h2>Twój sketchbook jest pusty</h2>
    <p>Przeciągnij zdjęcia tutaj<br>lub kliknij „+ Dodaj"</p>
  </div>
</div>

<div class="dz" id="dz">
  <div class="dz-in">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    <p>Upuść rysunki tutaj</p>
  </div>
</div>

<div class="fab-wrap">
  <button class="fab-s" onclick="toggleMove()" title="Przesuń" id="mobMoveBtn">↕</button>
  <button class="fab-s" onclick="addTextNote()" title="Tekst">T</button>
  <button class="fab-s" onclick="triggerCamera()" title="Aparat">📷</button>
  <button class="fab" onclick="triggerUpload()" title="Dodaj">+</button>
</div>

<button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<div class="cf-ov" id="cfOv">
  <div class="cf-box">
    <p id="cfMsg">Usunąć?</p>
    <div class="cf-acts">
      <button class="btn" onclick="cfCancel()">Anuluj</button>
      <button class="btn pr" onclick="cfDo()" style="background:var(--accent);border-color:var(--accent)">Usuń</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<div class="mv-indicator">↕ tryb przesuwania — kliknij „Przesuń" by wyłączyć</div>

<script>
const DB='sketchbook_v2',VER=1,S1='sketches',S2='notes';
let db=null;

function oDB(){return new Promise((ok,no)=>{const r=indexedDB.open(DB,VER);r.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains(S1))d.createObjectStore(S1,{keyPath:'id'});if(!d.objectStoreNames.contains(S2))d.createObjectStore(S2,{keyPath:'id'})};r.onsuccess=e=>{db=e.target.result;ok(db)};r.onerror=e=>no(e)})}
function dP(s,i){return new Promise((ok,no)=>{const t=db.transaction(s,'readwrite');t.objectStore(s).put(i);t.oncomplete=()=>ok();t.onerror=e=>no(e)})}
function dD(s,id){return new Promise((ok,no)=>{const t=db.transaction(s,'readwrite');t.objectStore(s).delete(id);t.oncomplete=()=>ok();t.onerror=e=>no(e)})}
function dA(s){return new Promise((ok,no)=>{const t=db.transaction(s,'readonly');const r=t.objectStore(s).getAll();r.onsuccess=()=>ok(r.result);r.onerror=e=>no(e)})}

let sks=[],nts=[],dragSt=null,rsSt=null,cfCb=null,nZ=1,gridOn=false,menuOn=false;

async function init(){await oDB();sks=await dA(S1);nts=await dA(S2);nZ=Math.max(...sks.map(s=>s.z||0),...nts.map(n=>n.z||0),0)+1;renderAll();setupDD();setupScroll()}

function triggerUpload(){document.getElementById('fileIn').click();toggleMenu(false)}
function triggerCamera(){document.getElementById('cameraIn').click();toggleMenu(false)}

function handleFiles(f){const a=Array.from(f).filter(f=>f.type.startsWith('image/'));if(!a.length)return;a.forEach((f,i)=>procFile(f,i));document.getElementById('fileIn').value='';document.getElementById('cameraIn').value=''}

function procFile(file,off=0){
  const reader=new FileReader();
  reader.onload=async e=>{
    const src=await resImg(e.target.result,1600);
    const id='sk_'+Date.now()+'_'+rn();
    const sy=window.scrollY,vw=window.innerWidth,w=Math.min(360,vw-40);
    const x=Math.max(10,(vw-w)/2+(off*25)),y=sy+90+(off*25);
    const sk={id,src,x,y,w,caption:'',locked:false,z:nZ++,date:ds()};
    sks.push(sk);await dP(S1,sk);renderSk(sk);uC();uE();exp();toast('Dodano rysunek ✓');
  };reader.readAsDataURL(file);
}

function resImg(d,mx){return new Promise(ok=>{const img=new Image();img.onload=()=>{if(img.width<=mx){ok(d);return}const r=mx/img.width,c=document.createElement('canvas');c.width=mx;c.height=img.height*r;c.getContext('2d').drawImage(img,0,0,c.width,c.height);ok(c.toDataURL('image/jpeg',0.82))};img.src=d})}

async function addTextNote(){
  const id='nt_'+Date.now()+'_'+rn(),sy=window.scrollY,vw=window.innerWidth;
  const x=Math.max(20,(vw-300)/2),y=sy+100;
  const nt={id,text:'',x,y,size:'md',locked:false,z:nZ++,date:ds()};
  nts.push(nt);await dP(S2,nt);renderNt(nt);uC();uE();
  setTimeout(()=>{const el=document.getElementById(id);if(el)el.querySelector('.nt-text').focus()},50);
}

function renderAll(){
  const cv=document.getElementById('canvas');
  cv.querySelectorAll('.sk,.nt').forEach(e=>e.remove());
  sks.sort((a,b)=>(a.z||0)-(b.z||0)).forEach(s=>renderSk(s));
  nts.sort((a,b)=>(a.z||0)-(b.z||0)).forEach(n=>renderNt(n));
  uC();uE();exp();
}

function renderSk(s){
  const cv=document.getElementById('canvas'),el=document.createElement('div');
  el.className='sk'+(s.locked?' locked':'');el.id=s.id;
  el.style.cssText=`left:${s.x}px;top:${s.y}px;width:${s.w}px;z-index:${s.z}`;
  el.innerHTML=`<div class="drag-handle" data-drag="${s.id}"><div class="grip"><span></span><span></span></div></div><div class="sk-img"><img src="${s.src}" draggable="false"><div class="sk-ctrl"><button class="sb ${s.locked?'on':''}" onclick="togL('${s.id}')">${s.locked?'🔒':'🔓'}</button><button class="sb del" onclick="askD('${s.id}','s')">✕</button></div></div><div class="sk-cap"><textarea class="cap-in" placeholder="podpis..." rows="1" oninput="aG(this);sC('${s.id}',this.value)">${s.caption||''}</textarea></div><div class="sk-date">${s.date||''}</div><div class="rh" data-id="${s.id}"></div>`;
  setDrag(el,s.id,'s');
  el.querySelector('.rh').addEventListener('pointerdown',e=>{e.stopPropagation();startRs(e,s.id)});
  el.addEventListener('touchstart',()=>el.classList.add('ta'),{passive:true});
  el.addEventListener('touchend',()=>setTimeout(()=>el.classList.remove('ta'),400),{passive:true});
  cv.appendChild(el);setTimeout(()=>aG(el.querySelector('.cap-in')),10);
}

function renderNt(n){
  const cv=document.getElementById('canvas'),el=document.createElement('div');
  el.className='nt'+(n.locked?' locked':'');el.id=n.id;
  el.style.cssText=`left:${n.x}px;top:${n.y}px;z-index:${n.z}`;
  const sc=n.size==='sm'?'sm':n.size==='lg'?'lg':n.size==='xl'?'xl':'';
  el.innerHTML=`<div class="nt-handle" data-drag="${n.id}"><div class="grip"><span></span><span></span><span></span><span></span><span></span></div></div><div class="nt-ctrl"><button class="sb" onclick="cyS('${n.id}')">A</button><button class="sb ${n.locked?'on':''}" onclick="togLN('${n.id}')">${n.locked?'🔒':'🔓'}</button><button class="sb del" onclick="askD('${n.id}','n')">✕</button></div><textarea class="nt-text ${sc}" placeholder="pisz tutaj..." oninput="aG(this);sNT('${n.id}',this.value)">${n.text||''}</textarea>`;
  setDrag(el,n.id,'n');
  el.addEventListener('touchstart',()=>el.classList.add('ta'),{passive:true});
  el.addEventListener('touchend',()=>setTimeout(()=>el.classList.remove('ta'),400),{passive:true});
  cv.appendChild(el);setTimeout(()=>aG(el.querySelector('.nt-text')),10);
}

function setDrag(el,id,tp){
  // Drag handle - primary drag target (always works)
  const handle=el.querySelector('[data-drag]');
  if(handle)handle.addEventListener('pointerdown',e=>{e.stopPropagation();startDrag(e,id,tp,true)});
  // Whole card - secondary drag target (works on desktop hover or in move mode)
  el.addEventListener('pointerdown',e=>startDrag(e,id,tp,false));
}

let moveMode=false;
function toggleMove(){
  moveMode=!moveMode;
  document.body.classList.toggle('move-mode',moveMode);
  const b=document.getElementById('moveBtn');
  b.style.background=moveMode?'var(--accent)':'';b.style.color=moveMode?'var(--paper)':'';b.style.borderColor=moveMode?'var(--accent)':'';
  toast(moveMode?'Tryb przesuwania włączony ↕':'Tryb przesuwania wyłączony');
}

function startDrag(e,id,tp,fromHandle){
  const items=tp==='s'?sks:nts,item=items.find(i=>i.id===id);
  if(!item||item.locked)return;
  if(!fromHandle&&!moveMode){
    if(e.target.closest('.sb')||e.target.closest('.cap-in')||e.target.closest('.nt-text')||e.target.closest('.rh'))return;
    // On touch devices, only drag from handle unless in move mode
    if(e.pointerType==='touch')return;
  }
  if(e.target.closest('.sb'))return;
  const el=document.getElementById(id);item.z=nZ++;el.style.zIndex=item.z;
  dragSt={id,tp,sx:e.clientX,sy:e.clientY,ox:item.x,oy:item.y,moved:false};
  el.classList.add('dragging');el.setPointerCapture(e.pointerId);
  const onM=ev=>{if(!dragSt)return;const dx=ev.clientX-dragSt.sx,dy=ev.clientY-dragSt.sy;if(Math.abs(dx)>1||Math.abs(dy)>1)dragSt.moved=true;if(!dragSt.moved)return;item.x=Math.max(0,dragSt.ox+dx);item.y=Math.max(50,dragSt.oy+dy);el.style.left=item.x+'px';el.style.top=item.y+'px';exp()};
  const onU=async()=>{el.classList.remove('dragging');el.removeEventListener('pointermove',onM);el.removeEventListener('pointerup',onU);if(dragSt&&dragSt.moved)await dP(tp==='s'?S1:S2,item);dragSt=null};
  el.addEventListener('pointermove',onM);el.addEventListener('pointerup',onU);
}

function startRs(e,id){
  const s=sks.find(s=>s.id===id);if(!s||s.locked)return;const el=document.getElementById(id);
  rsSt={id,sx:e.clientX,ow:s.w};
  const onM=ev=>{if(!rsSt)return;s.w=Math.max(120,rsSt.ow+(ev.clientX-rsSt.sx));el.style.width=s.w+'px';exp()};
  const onU=async()=>{document.removeEventListener('pointermove',onM);document.removeEventListener('pointerup',onU);if(rsSt)await dP(S1,s);rsSt=null};
  document.addEventListener('pointermove',onM);document.addEventListener('pointerup',onU);
}

async function togL(id){const s=sks.find(s=>s.id===id);if(!s)return;s.locked=!s.locked;await dP(S1,s);const el=document.getElementById(id);el.classList.toggle('locked',s.locked);const b=el.querySelector('.sk-ctrl .sb');b.classList.toggle('on',s.locked);b.innerHTML=s.locked?'🔒':'🔓';toast(s.locked?'Zablokowano 🔒':'Odblokowano 🔓')}
async function togLN(id){const n=nts.find(n=>n.id===id);if(!n)return;n.locked=!n.locked;await dP(S2,n);const el=document.getElementById(id);el.classList.toggle('locked',n.locked);const b=el.querySelectorAll('.nt-ctrl .sb')[1];b.classList.toggle('on',n.locked);b.innerHTML=n.locked?'🔒':'🔓';toast(n.locked?'Zablokowano 🔒':'Odblokowano 🔓')}

async function cyS(id){const n=nts.find(n=>n.id===id);if(!n)return;const sz=['md','lg','xl','sm'];n.size=sz[(sz.indexOf(n.size||'md')+1)%sz.length];await dP(S2,n);const ta=document.getElementById(id).querySelector('.nt-text');ta.className='nt-text'+(n.size!=='md'?' '+n.size:'');aG(ta)}

async function sC(id,v){const s=sks.find(s=>s.id===id);if(s){s.caption=v;await dP(S1,s)}}
async function sNT(id,v){const n=nts.find(n=>n.id===id);if(n){n.text=v;await dP(S2,n)}}

function askD(id,tp){
  const item=tp==='s'?sks.find(s=>s.id===id):nts.find(n=>n.id===id);if(!item)return;
  document.getElementById('cfMsg').textContent=`Usunąć ${tp==='s'?(item.caption||'ten rysunek'):(item.text?.slice(0,30)||'tę notatkę')}?`;
  document.getElementById('cfOv').classList.add('on');
  cfCb=async()=>{
    if(tp==='s'){sks=sks.filter(s=>s.id!==id);await dD(S1,id)}else{nts=nts.filter(n=>n.id!==id);await dD(S2,id)}
    const el=document.getElementById(id);if(el){el.style.transition='opacity .3s,transform .3s';el.style.opacity='0';el.style.transform='scale(.9)';setTimeout(()=>el.remove(),300)}
    uC();uE();toast('Usunięto');
  };
}
function cfDo(){document.getElementById('cfOv').classList.remove('on');if(cfCb){cfCb();cfCb=null}}
function cfCancel(){document.getElementById('cfOv').classList.remove('on');cfCb=null}

async function lockAll(){for(const s of sks){s.locked=true;await dP(S1,s)}for(const n of nts){n.locked=true;await dP(S2,n)}renderAll();toast('Zablokowano wszystko 🔒');toggleMenu(false)}
async function unlockAll(){for(const s of sks){s.locked=false;await dP(S1,s)}for(const n of nts){n.locked=false;await dP(S2,n)}renderAll();toast('Odblokowano wszystko 🔓');toggleMenu(false)}

async function exportBackup(){
  const data={version:2,date:new Date().toISOString(),sketches:sks,notes:nts};
  const blob=new Blob([JSON.stringify(data)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`sketchbook_${new Date().toISOString().slice(0,10)}.json`;a.click();
  URL.revokeObjectURL(url);toast('Backup zapisany ✓');toggleMenu(false);
}

async function importBackup(file){
  if(!file)return;
  try{
    const d=JSON.parse(await file.text());
    if(!d.sketches&&!d.notes){toast('Nieprawidłowy plik');return}
    const cnt=(d.sketches?.length||0)+(d.notes?.length||0);
    if(!confirm(`Importować ${cnt} elementów?`))return;
    const ids=new Set([...sks.map(s=>s.id),...nts.map(n=>n.id)]);
    let add=0;
    if(d.sketches)for(const s of d.sketches){if(!ids.has(s.id)){s.z=nZ++;sks.push(s);await dP(S1,s);add++}}
    if(d.notes)for(const n of d.notes){if(!ids.has(n.id)){n.z=nZ++;nts.push(n);await dP(S2,n);add++}}
    renderAll();toast(`Zaimportowano ${add} el. ✓`);
  }catch(e){console.error(e);toast('Błąd importu')}
  document.getElementById('importIn').value='';toggleMenu(false);
}

function toggleGrid(){
  gridOn=!gridOn;const b=document.getElementById('gridBtn');
  b.style.background=gridOn?'var(--ink)':'';b.style.color=gridOn?'var(--paper)':'';b.style.borderColor=gridOn?'var(--ink)':'';
  if(gridOn)arrGrid();
  else[...sks,...nts].forEach(it=>{const el=document.getElementById(it.id);if(el){el.style.left=it.x+'px';el.style.top=it.y+'px';if(it.w)el.style.width=it.w+'px';el.style.transition='left .4s,top .4s,width .4s';setTimeout(()=>el.style.transition='',500)}});
}

function arrGrid(){
  const vw=window.innerWidth,cols=Math.max(1,Math.floor((vw-60)/300)),gap=20,cW=(vw-40-(cols-1)*gap)/cols,cH=new Array(cols).fill(72);
  const all=[...sks.map(s=>({...s,_t:'s'})),...nts.map(n=>({...n,_t:'n'}))].sort((a,b)=>(a.z||0)-(b.z||0));
  all.forEach(it=>{const el=document.getElementById(it.id);if(!el)return;const mH=Math.min(...cH),col=cH.indexOf(mH);
  el.style.transition='left .4s,top .4s,width .4s';el.style.left=(20+col*(cW+gap))+'px';el.style.top=cH[col]+'px';
  if(it._t==='s')el.style.width=cW+'px';
  setTimeout(()=>{cH[col]+=el.offsetHeight+gap;el.style.transition='';exp()},450)});
}

function toggleMenu(f){menuOn=f!==undefined?f:!menuOn;document.getElementById('menu').classList.toggle('open',menuOn)}

function uC(){const n=sks.length+nts.length;document.getElementById('cnt').textContent=n+' '+(n===1?'element':n<5?'elementy':'elementów')}
function uE(){document.getElementById('emptyEl').style.display=(sks.length+nts.length)?'none':''}
function exp(){const cv=document.getElementById('canvas');let m=window.innerHeight;[...sks,...nts].forEach(i=>{const el=document.getElementById(i.id);if(el){const b=i.y+el.offsetHeight+300;if(b>m)m=b}});cv.style.minHeight=m+'px'}
function aG(el){el.style.height='auto';el.style.height=el.scrollHeight+'px'}
function ds(){return new Date().toLocaleDateString('pl-PL',{day:'numeric',month:'long',year:'numeric'})}
function rn(){return Math.random().toString(36).slice(2,8)}
function toast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),2200)}

function setupDD(){
  let dc=0;const dz=document.getElementById('dz');
  document.addEventListener('dragenter',e=>{e.preventDefault();dc++;if(e.dataTransfer.types.includes('Files'))dz.classList.add('on')});
  document.addEventListener('dragleave',e=>{e.preventDefault();dc--;if(dc<=0){dc=0;dz.classList.remove('on')}});
  document.addEventListener('dragover',e=>e.preventDefault());
  document.addEventListener('drop',e=>{e.preventDefault();dc=0;dz.classList.remove('on');if(e.dataTransfer.files.length)handleFiles(e.dataTransfer.files)});
}

function setupScroll(){
  window.addEventListener('scroll',()=>{const y=window.scrollY;document.getElementById('toolbar').classList.toggle('scrolled',y>10);document.getElementById('scrollTop').classList.toggle('vis',y>300)},{passive:true});
}

document.addEventListener('click',e=>{if(menuOn&&!e.target.closest('.menu')&&!e.target.closest('#menuBtn'))toggleMenu(false)});
init();
</script>
